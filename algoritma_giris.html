// ── APP ──────────────────────────────────────────────────────
function App() {
  const [screen, setScreen] = useState("home");
  const [activeMission, setActiveMission] = useState(0);
  const [completed, setCompleted] = useState([]);

  const startMission = (idx) => { setActiveMission(idx); setScreen("mission"); };
  const finishMission = (idx) => {
    const next = completed.includes(idx) ? completed : [...completed, idx];
    setCompleted(next);
    if (next.length === MISSIONS.length) setScreen("victory");
    else setScreen("home");
  };

  return (
    <div style={{
      minHeight:"100vh", background:C.paper, color:C.ink,
      fontFamily:"'Plus Jakarta Sans', system-ui, sans-serif",
      backgroundImage:`radial-gradient(circle at 20% 10%, rgba(232,151,58,0.08) 0%, transparent 40%),
        radial-gradient(circle at 80% 80%, rgba(47,125,90,0.07) 0%, transparent 45%),
        repeating-linear-gradient(0deg, ${C.lineSoft} 0px, ${C.lineSoft} 1px, transparent 1px, transparent 32px),
        repeating-linear-gradient(90deg, ${C.lineSoft} 0px, ${C.lineSoft} 1px, transparent 1px, transparent 32px)`,
      backgroundAttachment:"fixed"
    }}>
      <Header />
      {screen === "home" && <Home completed={completed} onStart={startMission} />}
      {screen === "mission" && <Mission mission={MISSIONS[activeMission]} onExit={() => setScreen("home")} onComplete={() => finishMission(activeMission)} />}
      {screen === "victory" && <Victory onReset={() => { setCompleted([]); setScreen("home"); }} />}
      <Footer />
    </div>
  );
}

      <div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:11,color:mission.accent,marginBottom:6,fontWeight:500}}>{mission.contextTag}</div>
      <h3 style={{fontFamily:"'Bricolage Grotesque',sans-serif",fontWeight:700,fontSize:22,letterSpacing:-0.5,margin:"0 0 12px"}}>{mission.title}</h3>
      <div style={{fontSize:13,lineHeight:1.5,opacity:0.7,marginBottom:16}}>{mission.intro.slice(0,110)}…</div>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",paddingTop:14,borderTop:`1px solid ${C.line}`}}>
        <div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:12,color:done?mission.accent:C.ink,opacity:0.85}}>
          {done ? "✓ tamamlandı" : unlocked ? "→ başla" : "kilitli"}
        </div>
        {unlocked && !done && <ArrowRight size={18} style={{opacity:0.6}} />}
        {done && <CheckCircle2 size={18} color={mission.accent} />}
      </div>
    </div>
  );
}

// ── MISSION FLOW ─────────────────────────────────────────────
function Mission({ mission, onExit, onComplete }) {
  const [stage, setStage] = useState(0);
  const stages = ["Brifing","Değişkenler","Fonksiyon","Algoritma","Test"];
  const [varSelect, setVarSelect] = useState({});
  const [funcChoice, setFuncChoice] = useState(null);
  const [funcChecked, setFuncChecked] = useState(false);
  const [slots, setSlots] = useState({ input:null, process:null, output:null });
  const [showCode, setShowCode] = useState(false);
  const [testIdx, setTestIdx] = useState(0);
  const [testValue, setTestValue] = useState("");
  const [testRun, setTestRun] = useState(null);

  const goNext = () => setStage(s => Math.min(s+1,4));
  const goPrev = () => setStage(s => Math.max(s-1,0));

  const variablesValid =
    Object.values(varSelect).filter(v=>v==="input").length===1 &&
    Object.values(varSelect).filter(v=>v==="output").length===1 &&
    mission.variableOptions.every((opt,i) => (varSelect[i]||"none")===opt.role);
  const functionValid = funcChoice!==null && mission.funcOptions[funcChoice].correct;
  const algorithmValid = slots.input!==null && slots.process!==null && slots.output!==null &&
    mission.inputSlotOptions[slots.input].correct &&
    mission.processSlotOptions[slots.process].correct &&
    mission.outputSlotOptions[slots.output].correct;

  const canAdvance = [true, variablesValid, functionValid&&funcChecked, algorithmValid, testRun?.correct===true][stage];

  return (
    <main style={{maxWidth:980,margin:"0 auto",padding:"32px 32px 60px"}}>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:28}}>
        <button onClick={onExit} style={{background:"transparent",border:`1px solid ${C.line}`,color:C.ink,padding:"8px 14px",borderRadius:8,fontSize:13,display:"flex",alignItems:"center",gap:6,opacity:0.7}}>
          <ArrowLeft size={14} /> Görev Merkezi
        </button>
        <div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:12,opacity:0.6,letterSpacing:1}}>
          {mission.short} · {mission.title.toUpperCase()}
        </div>
      </div>

      <StageProgress stages={stages} current={stage} accent={mission.accent} />

      <div key={stage} className="anim-up" style={{marginTop:36,minHeight:440}}>
        {stage===0 && <BriefStage mission={mission} />}
        {stage===1 && <VariableStage mission={mission} selection={varSelect} onSelect={(i,role)=>setVarSelect({...varSelect,[i]:role})} valid={variablesValid} />}
        {stage===2 && <FunctionStage mission={mission} choice={funcChoice} onChoose={(i)=>{setFuncChoice(i);setFuncChecked(false);}} checked={funcChecked} onCheck={()=>setFuncChecked(true)} />}
        {stage===3 && <AlgorithmStage mission={mission} slots={slots} setSlots={setSlots} showCode={showCode} setShowCode={setShowCode} />}
        {stage===4 && <TestStage mission={mission} testIdx={testIdx} setTestIdx={setTestIdx} testValue={testValue} setTestValue={setTestValue} testRun={testRun} setTestRun={setTestRun} />}
      </div>

      <div style={{marginTop:36,paddingTop:20,borderTop:`1px solid ${C.line}`,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <button onClick={goPrev} disabled={stage===0} style={{background:"transparent",border:`1px solid ${C.line}`,color:C.ink,padding:"10px 18px",borderRadius:10,fontSize:14,opacity:stage===0?0.3:0.8,cursor:stage===0?"not-allowed":"pointer"}}>
          ← Geri
        </button>
        {stage < 4 ? (
          <button onClick={goNext} disabled={!canAdvance} style={{background:canAdvance?mission.accent:"rgba(16,36,59,0.12)",color:canAdvance?C.paper:"rgba(16,36,59,0.4)",border:"none",padding:"12px 22px",borderRadius:10,fontSize:14,fontWeight:600,display:"flex",alignItems:"center",gap:8,cursor:canAdvance?"pointer":"not-allowed",transition:"all 0.2s"}}>
            Sonraki adım <ArrowRight size={16} />
          </button>
        ) : (
          <button onClick={onComplete} disabled={!canAdvance} style={{background:canAdvance?mission.accent:"rgba(16,36,59,0.12)",color:canAdvance?C.paper:"rgba(16,36,59,0.4)",border:"none",padding:"12px 22px",borderRadius:10,fontSize:14,fontWeight:600,display:"flex",alignItems:"center",gap:8,cursor:canAdvance?"pointer":"not-allowed"}}>
            <Trophy size={16} /> Görevi tamamla
          </button>
        )}
      </div>
    </main>
  );
}

function StageProgress({ stages, current, accent }) {
  return (
    <div style={{display:"flex",gap:8}}>
      {stages.map((s,i) => {
        const active = i===current, done = i<current;
        return (
          <div key={s} style={{flex:1}}>
            <div style={{height:4,borderRadius:2,background:done||active?accent:"rgba(16,36,59,0.12)",transition:"all 0.3s"}} />
            <div style={{marginTop:8,fontFamily:"'JetBrains Mono',monospace",fontSize:10,letterSpacing:1,color:active?accent:"rgba(16,36,59,0.5)",fontWeight:active?700:400}}>
              0{i+1} · {s.toUpperCase()}
            </div>
          </div>
        );
      })}
    </div>
  );
}

// ── STAGE 0 — BRIEF ──────────────────────────────────────────
function BriefStage({ mission }) {
  const Icon = mission.icon;
  return (
    <div style={{background:C.paperDeep,borderRadius:18,padding:36,border:`1.5px solid ${C.line}`,position:"relative",overflow:"hidden"}}>
      <div style={{position:"absolute",top:-20,right:-20,width:200,height:200,borderRadius:"50%",background:mission.accent,opacity:0.08}} />
      <div style={{display:"flex",alignItems:"center",gap:16,marginBottom:24}}>
        <div style={{width:64,height:64,borderRadius:14,background:mission.accent,color:C.paper,display:"grid",placeItems:"center"}}>
          <Icon size={32} />
        </div>
        <div>
          <div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:11,color:mission.accent,letterSpacing:1.5,marginBottom:4}}>BRİFİNG · {mission.contextTag}</div>
          <h2 style={{fontFamily:"'Bricolage Grotesque',sans-serif",fontWeight:700,fontSize:30,letterSpacing:-0.7,margin:0}}>{mission.title}</h2>
        </div>
      </div>
      <p style={{fontSize:16,lineHeight:1.65,opacity:0.85,maxWidth:640}}>{mission.intro}</p>
      <div style={{marginTop:24,padding:16,background:"rgba(16,36,59,0.05)",borderLeft:`3px solid ${mission.accent}`,borderRadius:6,fontSize:14,fontStyle:"italic",opacity:0.75}}>
        Sıradaki adım: Bu problemde <b>girdi</b> ve <b>çıktı</b> değişkenlerini ayırt et.
      </div>
    </div>
  );
}

// ── STAGE 1 — VARIABLES ──────────────────────────────────────
function VariableStage({ mission, selection, onSelect, valid }) {
  const inputCount = Object.values(selection).filter(v=>v==="input").length;
  const outputCount = Object.values(selection).filter(v=>v==="output").length;
  return (
    <div>
      <StageHeader n="01" title="Değişkenleri Belirle" sub="Algoritmanın GİRDİSİ ve ÇIKTISI olacak büyüklükleri seç. Konuyla ilgisiz olanları işaretleme." accent={mission.accent} />
      <div style={{display:"grid",gap:12,marginTop:24}}>
        {mission.variableOptions.map((opt,i) => {
          const sel = selection[i] || "none";
          return (
            <div key={i} style={{background:C.paperDeep,border:`1.5px solid ${sel==="input"?mission.accent:sel==="output"?C.amber:C.line}`,borderRadius:12,padding:"14px 18px",display:"flex",alignItems:"center",justifyContent:"space-between",gap:16,transition:"all 0.2s"}}>
              <div style={{fontSize:15,fontWeight:500}}>{opt.name}</div>
              <div style={{display:"flex",gap:6}}>
                <ChipButton active={sel==="input"} onClick={()=>onSelect(i,sel==="input"?"none":"input")} color={mission.accent} disabled={sel!=="input"&&inputCount>=1}>GİRDİ</ChipButton>
                <ChipButton active={sel==="output"} onClick={()=>onSelect(i,sel==="output"?"none":"output")} color={C.amber} disabled={sel!=="output"&&outputCount>=1}>ÇIKTI</ChipButton>
              </div>
            </div>
          );
        })}
      </div>
      <FeedbackBar valid={valid} hint="Bir GİRDİ ve bir ÇIKTI seçmelisin. İlgisiz seçenekleri boş bırak." />
    </div>
  );
}

function ChipButton({ active, onClick, color, disabled, children }) {
  return (
    <button onClick={onClick} disabled={disabled} style={{background:active?color:"transparent",color:active?C.paper:disabled?"rgba(16,36,59,0.3)":C.ink,border:`1.5px solid ${active?color:C.line}`,padding:"6px 12px",borderRadius:999,fontSize:11,fontFamily:"'JetBrains Mono',monospace",fontWeight:600,letterSpacing:0.8,cursor:disabled?"not-allowed":"pointer",transition:"all 0.15s"}}>
      {children}
    </button>
  );
}

// ── STAGE 2 — FUNCTION ───────────────────────────────────────
function FunctionStage({ mission, choice, onChoose, checked, onCheck }) {
  const isCorrect = choice!==null && mission.funcOptions[choice].correct;
  const th = {textAlign:"left",padding:"10px 8px",fontSize:11,fontFamily:"'JetBrains Mono',monospace",letterSpacing:0.6,opacity:0.65};
  const td = {padding:"10px 8px",fontFamily:"'JetBrains Mono',monospace"};
  return (
    <div>
      <StageHeader n="02" title="Fonksiyonu Keşfet" sub="Tablodaki sayılar arasındaki ilişkiyi inceleyerek doğrusal fonksiyonu seç." accent={mission.accent} />
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:20,marginTop:24}}>
        <div style={{background:C.paperDeep,border:`1.5px solid ${C.line}`,borderRadius:14,padding:20}}>
          <div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:11,letterSpacing:1.5,opacity:0.6,marginBottom:12}}>VERİ TABLOSU</div>
          <table style={{width:"100%",borderCollapse:"collapse",fontSize:14}}>
            <thead>
              <tr style={{borderBottom:`2px solid ${C.ink}`}}>
                <th style={th}>x · {mission.inputName}</th>
                <th style={th}>y · {mission.outputName}</th>
              </tr>
            </thead>
            <tbody>
              {mission.table.map((row,i) => (
                <tr key={i} style={{borderBottom:`1px solid ${C.line}`}}>
                  <td style={td}>{row.x.toString().replace(".",",")}</td>
                  <td style={{...td,color:mission.accent,fontWeight:600}}>{row.y.toString().replace(".",",")}</td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
        <div style={{display:"flex",flexDirection:"column",gap:10}}>
          <div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:11,letterSpacing:1.5,opacity:0.6,marginBottom:4}}>FONKSİYON SEÇENEKLERİ</div>
          {mission.funcOptions.map((opt,i) => {
            const sel = choice===i;
            const showWrong = checked&&sel&&!opt.correct;
            const showRight = checked&&sel&&opt.correct;
            return (
              <button key={i} onClick={()=>onChoose(i)} style={{background:sel?mission.accent:C.paperDeep,color:sel?C.paper:C.ink,border:`1.5px solid ${showWrong?C.rose:showRight?mission.accent:sel?mission.accent:C.line}`,padding:"16px 18px",borderRadius:10,fontSize:16,fontFamily:"'JetBrains Mono',monospace",fontWeight:500,textAlign:"left",transition:"all 0.15s",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
                <span>{opt.display}</span>
                {showRight && <CheckCircle2 size={18} />}
                {showWrong && <XCircle size={18} color={C.rose} />}
              </button>
            );
          })}
          <button onClick={onCheck} disabled={choice===null} style={{marginTop:4,background:"transparent",border:`1.5px dashed ${C.ink}`,color:C.ink,padding:"10px 14px",borderRadius:10,fontSize:13,fontWeight:600,opacity:choice===null?0.4:1,cursor:choice===null?"not-allowed":"pointer"}}>
            Cevabı kontrol et
          </button>
        </div>
      </div>
      {checked && !isCorrect && (
        <div className="anim-up" style={{marginTop:18,padding:16,background:"rgba(196,69,69,0.08)",border:`1px solid rgba(196,69,69,0.3)`,borderRadius:10,fontSize:14}}>
          <b style={{color:C.rose}}>Tekrar dene.</b> <span style={{opacity:0.85}}>İpucu: {mission.funcHint}</span>
        </div>
      )}
      {checked && isCorrect && (
        <div className="anim-up" style={{marginTop:18,padding:16,background:"rgba(47,125,90,0.1)",border:`1px solid ${C.eco}`,borderRadius:10,fontSize:14,display:"flex",alignItems:"center",gap:10}}>
          <CheckCircle2 size={20} color={C.eco} />
          <span><b style={{color:C.eco}}>Doğru!</b> Fonksiyon <span style={{fontFamily:"'JetBrains Mono',monospace",fontWeight:600}}>{mission.funcDisplay}</span> şeklindedir.</span>
        </div>
      )}
    </div>
  );
}

// ── STAGE 3 — ALGORITHM ──────────────────────────────────────
function AlgorithmStage({ mission, slots, setSlots, showCode, setShowCode }) {
  return (
    <div>
      <StageHeader n="03" title="Algoritmayı Kur" sub="Akış şemasındaki boşlukları doğru bloklarla doldur. İstersen sözde kod görünümüne de geçebilirsin." accent={mission.accent} />
      <div style={{display:"flex",gap:8,marginTop:20,padding:4,background:"rgba(16,36,59,0.06)",borderRadius:10,width:"fit-content"}}>
        <ToggleBtn active={!showCode} onClick={()=>setShowCode(false)}><Workflow size={14} /> Akış Şeması</ToggleBtn>
        <ToggleBtn active={showCode} onClick={()=>setShowCode(true)}><FileCode2 size={14} /> Sözde Kod</ToggleBtn>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:24,marginTop:24,alignItems:"start"}}>
        {showCode ? <PseudocodeView mission={mission} slots={slots} /> : <FlowchartView mission={mission} slots={slots} />}
        <div style={{display:"flex",flexDirection:"column",gap:18}}>
          <BlockPicker label="GİRDİ BLOĞU" color={mission.accent} options={mission.inputSlotOptions} selected={slots.input} onSelect={i=>setSlots({...slots,input:i})} />
          <BlockPicker label="İŞLEM BLOĞU" color={C.ink} options={mission.processSlotOptions} selected={slots.process} onSelect={i=>setSlots({...slots,process:i})} />
          <BlockPicker label="ÇIKTI BLOĞU" color={C.amber} options={mission.outputSlotOptions} selected={slots.output} onSelect={i=>setSlots({...slots,output:i})} />
        </div>
      </div>
    </div>
  );
}

function ToggleBtn({ active, onClick, children }) {
  return (
    <button onClick={onClick} style={{background:active?C.paper:"transparent",color:C.ink,border:"none",padding:"8px 14px",borderRadius:7,fontSize:12,fontWeight:600,display:"flex",alignItems:"center",gap:6,boxShadow:active?"0 1px 3px rgba(16,36,59,0.15)":"none",opacity:active?1:0.6}}>
      {children}
    </button>
  );
}

function FlowchartView({ mission, slots }) {
  const inputText = slots.input!==null ? mission.inputSlotOptions[slots.input].text : "?";
  const processText = slots.process!==null ? mission.processSlotOptions[slots.process].text : "?";
  const outputText = slots.output!==null ? mission.outputSlotOptions[slots.output].text : "?";
  return (
    <div style={{background:C.paperDeep,border:`1.5px solid ${C.line}`,borderRadius:14,padding:24,display:"flex",flexDirection:"column",alignItems:"center",gap:0}}>
      <FlowOval label="BAŞLA" color={C.ink} />
      <Connector />
      <FlowParallelogram label={inputText} color={mission.accent} placeholder={slots.input===null} />
      <Connector />
      <FlowRect label={processText} color={C.ink} placeholder={slots.process===null} />
      <Connector />
      <FlowParallelogram label={outputText} color={C.amber} placeholder={slots.output===null} />
      <Connector />
      <FlowOval label="BİTİR" color={C.ink} />
    </div>
  );
}

function FlowOval({ label, color }) {
  return <div style={{background:color,color:C.paper,padding:"10px 28px",borderRadius:999,fontFamily:"'JetBrains Mono',monospace",fontSize:12,fontWeight:700,letterSpacing:1}}>{label}</div>;
}
function FlowRect({ label, color, placeholder }) {
  return <div style={{background:placeholder?"transparent":C.paper,color:placeholder?"rgba(16,36,59,0.4)":C.ink,border:`2px ${placeholder?"dashed":"solid"} ${placeholder?C.line:color}`,padding:"14px 22px",borderRadius:6,fontFamily:"'JetBrains Mono',monospace",fontSize:13,fontWeight:600,minWidth:220,textAlign:"center"}}>{placeholder?"boş işlem bloğu":label}</div>;
}
function FlowParallelogram({ label, color, placeholder }) {
  return <div style={{background:placeholder?"transparent":color,color:placeholder?"rgba(16,36,59,0.4)":C.paper,border:placeholder?`2px dashed ${C.line}`:"none",padding:"12px 30px",clipPath:"polygon(8% 0, 100% 0, 92% 100%, 0 100%)",fontFamily:"'JetBrains Mono',monospace",fontSize:13,fontWeight:600,minWidth:240,textAlign:"center"}}>{placeholder?"boş giriş/çıkış bloğu":label}</div>;
}
function Connector() {
  return <div style={{width:2,height:22,background:C.ink,opacity:0.5,position:"relative"}}><div style={{position:"absolute",bottom:-2,left:-4,width:0,height:0,borderLeft:"5px solid transparent",borderRight:"5px solid transparent",borderTop:`6px solid ${C.ink}`,opacity:0.7}} /></div>;
}

function PseudocodeView({ mission, slots }) {
  const inputText = slots.input!==null ? mission.inputSlotOptions[slots.input].text : "...";
  const processText = slots.process!==null ? mission.processSlotOptions[slots.process].text : "...";
  const outputText = slots.output!==null ? mission.outputSlotOptions[slots.output].text : "...";
  const lines = [
    {n:"1",t:"BAŞLA",color:C.ink},
    {n:"2",t:inputText,color:mission.accent,placeholder:slots.input===null},
    {n:"3",t:processText,color:C.ink,placeholder:slots.process===null},
    {n:"4",t:outputText,color:C.amber,placeholder:slots.output===null},
    {n:"5",t:"BİTİR",color:C.ink},
  ];
  return (
    <div style={{background:C.ink,color:C.paper,borderRadius:14,padding:24,fontFamily:"'JetBrains Mono',monospace",fontSize:14,lineHeight:2}}>
      <div style={{fontSize:11,opacity:0.55,marginBottom:14,letterSpacing:1.5}}>// sözde kod · {mission.id}.algo</div>
      {lines.map(l => (
        <div key={l.n} style={{display:"flex",gap:14}}>
          <span style={{opacity:0.4,width:16}}>{l.n}</span>
          <span style={{color:l.placeholder?"rgba(245,237,220,0.3)":l.color,fontStyle:l.placeholder?"italic":"normal",fontWeight:600}}>{l.t}</span>
        </div>
      ))}
    </div>
  );
}

function BlockPicker({ label, color, options, selected, onSelect }) {
  return (
    <div>
      <div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:10,letterSpacing:1.5,opacity:0.6,marginBottom:8,color,fontWeight:700}}>{label}</div>
      <div style={{display:"flex",flexDirection:"column",gap:6}}>
        {options.map((opt,i) => {
          const sel = selected===i;
          return (
            <button key={i} onClick={()=>onSelect(i)} style={{background:sel?color:C.paperDeep,color:sel?C.paper:C.ink,border:`1.5px solid ${sel?color:C.line}`,padding:"10px 14px",borderRadius:8,fontSize:13,fontFamily:"'JetBrains Mono',monospace",fontWeight:500,textAlign:"left",transition:"all 0.15s"}}>
              {opt.text}
            </button>
          );
        })}
      </div>
    </div>
  );
}

// ── STAGE 4 — TEST ───────────────────────────────────────────
function TestStage({ mission, testIdx, setTestIdx, testValue, setTestValue, testRun, setTestRun }) {
  const currentInput = mission.testCases[testIdx];
  const expected = mission.func.m * currentInput + mission.func.b;

  const runTest = () => {
    const userAnswer = parseFloat(testValue.replace(",","."));
    if (isNaN(userAnswer)) return;
    const correct = Math.abs(userAnswer - expected) < 0.001;
    setTestRun({ userAnswer, expected, correct });
  };
  const reset = () => { setTestRun(null); setTestValue(""); };
  const nextCase = () => { setTestIdx((testIdx+1)%mission.testCases.length); reset(); };

  return (
    <div>
      <StageHeader n="04" title="Algoritmayı Test Et" sub="Şehir yetkilileri seni test ediyor! Aşağıdaki giriş değerini algoritmaya ver ve doğru çıktıyı üret." accent={mission.accent} />
      <div style={{background:C.paperDeep,border:`1.5px solid ${C.line}`,borderRadius:14,padding:28,marginTop:24}}>
        <div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:11,letterSpacing:1.5,opacity:0.6,marginBottom:8}}>TEST SENARYOSU {testIdx+1}/{mission.testCases.length}</div>
        <div style={{fontSize:17,lineHeight:1.5,marginBottom:24,maxWidth:580}}>
          Sisteme şu girdi geliyor: <b style={{color:mission.accent,fontFamily:"'JetBrains Mono',monospace"}}>{mission.inputVar} = {mission.testCases[testIdx]}</b>. Algoritmanın üreteceği {mission.outputName.toLowerCase()} değerini hesapla ve aşağıya gir.
        </div>
        <div style={{display:"flex",gap:12,alignItems:"center",flexWrap:"wrap"}}>
          <input type="text" value={testValue} onChange={e=>setTestValue(e.target.value)}
            onKeyDown={e=>e.key==="Enter"&&runTest()}
            placeholder={`${mission.outputVar} = ?`}
            style={{padding:"12px 16px",fontSize:16,fontFamily:"'JetBrains Mono',monospace",background:C.paper,border:`2px solid ${C.line}`,borderRadius:10,width:200,color:C.ink,outline:"none"}} />
          <button onClick={runTest} style={{background:C.ink,color:C.paper,border:"none",padding:"12px 18px",borderRadius:10,fontSize:13,fontWeight:600,display:"flex",alignItems:"center",gap:8}}>
            <Play size={14} /> Algoritmayı çalıştır
          </button>
          {testRun && (
            <button onClick={reset} style={{background:"transparent",color:C.ink,border:`1px solid ${C.line}`,padding:"12px 14px",borderRadius:10,fontSize:13,display:"flex",alignItems:"center",gap:6,opacity:0.7}}>
              <RotateCcw size={13} /> Sıfırla
            </button>
          )}
        </div>

        {testRun && (
          <div className="anim-up" style={{marginTop:24,padding:20,background:testRun.correct?"rgba(47,125,90,0.1)":"rgba(196,69,69,0.08)",border:`1.5px solid ${testRun.correct?C.eco:C.rose}`,borderRadius:12}}>
            <div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:11,letterSpacing:1.5,opacity:0.7,marginBottom:10,color:testRun.correct?C.eco:C.rose}}>ALGORİTMA İZ DÖKÜMÜ</div>
            <div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:15,lineHeight:1.8}}>
              <div>{">"} {mission.inputVar} = {currentInput}</div>
              <div>{">"} {mission.func.b===0
                ? `${mission.outputVar} ← ${mission.func.m.toString().replace(".",",")} × ${currentInput}`
                : `${mission.outputVar} ← ${mission.func.m.toString().replace(".",",")} × ${currentInput} + ${mission.func.b}`}</div>
              <div style={{fontSize:18,fontWeight:700,marginTop:8}}>{">"} {mission.outputVar} = {expected.toString().replace(".",",")} {mission.unit}</div>
            </div>
            {testRun.correct ? (
              <div style={{marginTop:14,display:"flex",alignItems:"center",gap:10}}>
                <CheckCircle2 size={20} color={C.eco} />
                <span style={{fontWeight:600}}>Mükemmel! Cevabın algoritma çıktısıyla aynı.</span>
              </div>
            ) : (
              <div style={{marginTop:14,display:"flex",alignItems:"center",gap:10}}>
                <XCircle size={20} color={C.rose} style={{flexShrink:0}} />
                <span>Senin cevabın <b>{testRun.userAnswer.toString().replace(".",",")}</b>, algoritmanın üretmesi gereken değer ise <b>{expected.toString().replace(".",",")}</b>. Tekrar dene.</span>
              </div>
            )}
          </div>
        )}
        {testRun?.correct && (
          <div style={{marginTop:18}}>
            <button onClick={nextCase} style={{background:"transparent",border:`1px dashed ${C.line}`,color:C.ink,padding:"10px 16px",borderRadius:10,fontSize:13,opacity:0.7}}>
              Başka bir senaryo dene →
            </button>
          </div>
        )}
      </div>
    </div>
  );
}

<script>
/* MFİ: kopyalama / inceleme caydırıcıları */
(function(){
  function inField(t){return t&&(t.tagName==="INPUT"||t.tagName==="TEXTAREA"||t.isContentEditable);}
  document.addEventListener("contextmenu",function(e){e.preventDefault();});
  document.addEventListener("copy",function(e){if(!inField(e.target))e.preventDefault();});
  document.addEventListener("cut",function(e){if(!inField(e.target))e.preventDefault();});
  document.addEventListener("dragstart",function(e){if(!inField(e.target))e.preventDefault();});
  document.addEventListener("keydown",function(e){
    var k=(e.key||"").toLowerCase();
    if(e.key==="F12"){e.preventDefault();return false;}
    if((e.ctrlKey||e.metaKey)&&e.shiftKey&&(k==="i"||k==="j"||k==="c")){e.preventDefault();return false;}
    if((e.ctrlKey||e.metaKey)&&!inField(e.target)&&(k==="u"||k==="s")){e.preventDefault();return false;}
  });
})();
</script>
